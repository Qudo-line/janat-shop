<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قسم الحقائب</title>
  </head>
  <body>
    <header>
      <img src="img/logo.png" alt="شعار المتجر (QJN)" class="logo" />
      <nav class="navbar">
        <ul>
          <li><a href="index.html#items">العودة</a></li>
        </ul>
      </nav>
    </header>
    <hr />
    <section class="sell-bags">
      <p class="sell-bags-title">قسم الحقائب</p>
      <div class="bags-section">
        <div class="sell-card">
          <img src="img/bag1.jpeg" alt="حقيبة بيضاء مطعمة بحبيبات السكر" />
          <p class="price">40000 دينار عراقي</p>
        </div>
        <div class="sell-card">
          <img src="img/bag2.jpeg" alt="حقيبة سوداء مطعمة بحبيبات السكر" />
          <p class="price">40000 دينار عراقي</p>
        </div>
        <div class="sell-card">
          <img src="img/bag3.jpeg" alt="حقيبة سوداء بخرز نوع اكرلك" />
          <p class="price">40000 دينار عراقي</p>
        </div>
      </div>
      <div class="bags-section">
        <div class="sell-card">
          <img src="img/BAG5.jpeg" alt="حقيبة بيضاء بالخرز" />
          <p class="price">25000 دينار عراقي</p>
        </div>
        <div class="sell-card">
          <img src="img/bag4.jpeg" alt="حقيبة حمراء مربعة بالخرز" />
          <p class="price">25000 دينار عراقي</p>
        </div>
        <div class="sell-card">
          <img src="img/heart bag.jpeg" alt="حقيبة حمراء على شكل قلب بالخرز" />
          <p class="price">25000 دينار عراقي</p>
        </div>
      </div>
      <h1 class="note1">ملاحظة:</h1>
      <h2 class="note2">يتغير السعر حسب الحجم ونوع الخرز</h2>
    </section>
  </body>
</html>
